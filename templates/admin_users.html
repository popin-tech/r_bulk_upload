<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Broadciel Admin</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="{{ url_for('static', filename='shared.css') }}" rel="stylesheet">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .workspace-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        .table-dark {
            background: transparent !important;
        }
        .table-dark th {
            border-bottom: 2px solid rgba(255,255,255,0.1);
            color: rgba(248, 250, 252, 0.6);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }
        .table-dark td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 1rem 0.75rem;
        }
        .avatar-circle {
            width: 32px;
            height: 32px;
            background: #4285f4;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .status-pill {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-active { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-inactive { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .role-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .role-admin { background: #f59e0b; color: #000; }
        .role-ae { background: #3b82f6; color: #fff; }
        .role-viewer { background: #64748b; color: #fff; }

        .modal-content {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            color: #f8fafc;
        }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-footer { border-top: 1px solid rgba(255,255,255,0.1); }
        .form-control, .form-select {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(0,0,0,0.3);
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
    </style>
</head>
<body>
    <div id="app">
        {% set page_title = "Admin: User Management" %}
        {% include '_header.html' %}

        <main class="workspace-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1">使用者權限管理</h2>
                    <p class="text-muted mb-0">管理系統成員、角色與模組存取權限</p>
                </div>
                <button class="btn btn-primary" @click="openCreateModal">
                    <i class="fas fa-plus me-2"></i>新增使用者
                </button>
            </div>

            <div class="glass-panel p-0 overflow-hidden">
                <table class="table table-dark table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">使用者</th>
                            <th>角色</th>
                            <th>權限模組</th>
                            <th>狀態</th>
                            <th class="text-end pe-4">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="user in users" :key="user.id">
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <div class="avatar-circle me-3">[[ user.name ? user.name[0] : 'U' ]]</div>
                                    <div>
                                        <div class="fw-bold">[[ user.name || '未命名' ]]</div>
                                        <div class="text-muted small">[[ user.email ]]</div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="role-badge" :class="'role-' + user.role">[[ user.role ]]</span>
                            </td>
                            <td>
                                <div class="d-flex gap-1 flex-wrap">
                                    <span v-for="mod in user.access_modules" :key="mod" 
                                          class="badge bg-secondary" style="font-size: 0.65rem;">
                                        [[ mod ]]
                                    </span>
                                </div>
                            </td>
                            <td>
                                <span class="status-pill" :class="user.is_active ? 'status-active' : 'status-inactive'">
                                    [[ user.is_active ? '啟用' : '停用' ]]
                                </span>
                            </td>
                            <td class="text-end pe-4">
                                <button class="btn btn-sm btn-outline-light" @click="editUser(user)">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <!-- Edit/Create Modal -->
        <div class="modal fade" id="userModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">[[ isEdit ? '編輯使用者' : '新增使用者' ]]</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Email (登入帳號)</label>
                            <input type="email" class="form-control" v-model="form.email" :disabled="isEdit" placeholder="example@popin.cc">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">顯示名稱</label>
                            <input type="text" class="form-control" v-model="form.name" placeholder="輸入姓名">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">角色</label>
                            <select class="form-select" v-model="form.role">
                                <option value="admin">Admin</option>
                                <option value="ae">AE</option>
                                <option value="viewer">Viewer</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label d-block">啟動狀態</label>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" v-model="form.is_active">
                                <label class="form-check-label">已啟用</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">模組存取權限</label>
                            <div class="d-flex flex-wrap gap-3 mt-2">
                                <div class="form-check" v-for="mod in ['cmp', 'bh', 'media']" :key="mod">
                                    <input class="form-check-input" type="checkbox" :value="mod" v-model="form.access_modules">
                                    <label class="form-check-label">[[ mod.toUpperCase().replace('_', ' ') ]]</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" @click="saveUser">儲存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const { createApp } = Vue;
        createApp({
            delimiters: ['[[', ']]'],
            data() {
                return {
                    users: [],
                    isLauncherOpen: false,
                    isEdit: false,
                    form: {
                        id: null,
                        email: '',
                        name: '',
                        role: 'viewer',
                        is_active: true,
                        access_modules: ['cmp', 'bh', 'media']
                    },
                    modal: null
                }
            },
            mounted() {
                this.loadUsers();
                this.modal = new bootstrap.Modal(document.getElementById('userModal'));
                
                // Click outside to close launcher
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.app-launcher-container')) {
                        this.isLauncherOpen = false;
                    }
                });
            },
            methods: {
                async loadUsers() {
                    try {
                        const res = await fetch('/api/admin/users');
                        const data = await res.json();
                        if (data.status === 'ok') {
                            this.users = data.users;
                        }
                    } catch (err) { console.error(err); }
                },
                openCreateModal() {
                    this.isEdit = false;
                    this.form = {
                        id: null,
                        email: '',
                        name: '',
                        role: 'viewer',
                        is_active: true,
                        access_modules: ['cmp', 'bh', 'media']
                    };
                    this.modal.show();
                },
                editUser(user) {
                    this.isEdit = true;
                    this.form = JSON.parse(JSON.stringify(user));
                    this.modal.show();
                },
                async saveUser() {
                    const url = this.isEdit 
                        ? `/api/admin/users/${this.form.id}` 
                        : '/api/admin/users';
                    const method = this.isEdit ? 'PUT' : 'POST';
                    
                    try {
                        const res = await fetch(url, {
                            method: method,
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.form)
                        });
                        const result = await res.json();
                        if (result.status === 'ok') {
                            this.loadUsers();
                            this.modal.hide();
                        } else {
                            alert(result.message || '儲存失敗');
                        }
                    } catch (err) {
                        console.error(err);
                        alert('服務器錯誤');
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
